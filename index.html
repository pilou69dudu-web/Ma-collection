<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Collection de Vinyles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: #111;
            color: #fff;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .counter {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #222;
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #ffc107;
            color: #ffc107;
            font-weight: bold;
        }
        .search-container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .search-box {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-wanted {
            background-color: #111;
            color: #ffc107;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            float: right;
        }
        .btn-wanted:hover {
            background-color: #222;
        }
        /* Correction de la ligne 638 avec les doubles accolades */
        .clear-search-btn:hover {
            color: #555;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="counter">Total collection : 3756</div>
        <h1>Ma Collection de Vinyles</h1>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" placeholder="Rechercher un artiste, un titre, un pays...">
        <!-- Le bouton Wanted pointe désormais vers Wanted.html -->
        <a href="Wanted.html" class="btn-wanted">Wanted &rarr;</a>
        <div style="clear: both;"></div>
    </div>

    <!-- Le reste de votre code pour afficher les vinyles de la collection... -->

</body>
</html>
